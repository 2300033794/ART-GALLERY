spring.application.name=OnlineArt
server.port=2000

# Use in-memory H2 for local development to avoid external MySQL dependency
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:artdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# when using H2, no need to set MySQL dialect
